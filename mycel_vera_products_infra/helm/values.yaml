# mycel_vera_products/mycel_vera_products_infra/helm/values.yaml — SHIPS with release
image:
  registry: ""
  pullPolicy: IfNotPresent

artifacts:
  service:
    image: mycel_vera_products_service
    tag: latest
    targetPort: 3000
    subdomain: api
    probe: /health
    clusterEnv: true
    labels:
      egress-tier: external
    env:
      ACCEPT_LICENSE: "yes"
      SERVICE_NAME: "Mycel Vera Products"

  web:
    image: mycel_vera_products_web
    tag: latest
    targetPort: 3002
    subdomain: ""
    probe: /
    serviceUrl: true
    env:
      ACCEPT_LICENSE: "yes"
      VITE_API_BASE_URL: "http://api.vera-products.mycel.test"

  mcp:
    image: mycel_vera_products_mcp
    tag: latest
    targetPort: 3001
    subdomain: mcp
    probeType: tcp
    clusterEnv: true
    serviceUrl: true
    labels:
      egress-tier: external
    env:
      ACCEPT_LICENSE: "yes"
      MCP_HOST: "0.0.0.0"
      MCP_PORT: "3001"
      MCP_TRANSPORT: "streamable-http"
    extraEnv:
      - name: ROOT_MODULE_NAME
        value: mycel_vera_products
      - name: MCP_REGISTRY_PATH
        value: /tmp/mcp_registry.json

  mobile:
    image: mycel_vera_products_mobile
    tag: latest
    targetPort: 3003
    subdomain: mobile
    probe: /
    env:
      ACCEPT_LICENSE: "yes"

ingress:
  slug: vera-products
  domain: mycel.test
  className: traefik
  tls: false
  annotations: {}

config:
  ROOT_MODULE_NAME: mycel_vera_products
  SUBMODULES: ""
  LOG_LEVEL: info
  OTEL_SERVICE_NAME: mycel_vera_products-service
  MCP_URL: "http://mycel_vera_products-mcp/mcp"

replicas: 1
